version: "3.9"

services:
  fittrack:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3080:3000"
    volumes:
      - "${APP_DATA_DIR:-./data}/fittrack:/data"
    environment:
      DATABASE_URL: /data/fittrack.db
      NODE_ENV: production
      # Set to your local timezone so server-side dates (dashboard, streaks) match local time
      # Find your timezone at: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      TZ: America/Chicago
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/profile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
